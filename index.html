<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FiberManager</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Tudo em um único arquivo para evitar erros -->
    <script>
      // ========================================
      // TELA DE LOGIN
      // ========================================
      function showLogin() {
        document.getElementById('root').innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-indigo-50 via-blue-50 to-cyan-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 flex items-center justify-center p-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md p-8">
              
              <div class="flex justify-end mb-4">
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                  <span class="text-xl">🌙</span>
                </button>
              </div>

              <div class="text-center mb-8">
                <div class="text-6xl mb-3">🔷</div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-600 to-blue-600 bg-clip-text text-transparent">
                  FiberManager
                </h1>
                <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">
                  Gerenciamento de Bobinas de Fibra Óptica
                </p>
              </div>

              <form onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                  <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                    📧 E-mail
                  </label>
                  <input
                    type="email"
                    id="email"
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700 dark:text-white"
                    placeholder="seu@email.com"
                    required
                  />
                </div>

                <div>
                  <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                    🔒 Senha
                  </label>
                  <input
                    type="password"
                    id="senha"
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700 dark:text-white"
                    placeholder="••••••••"
                    required
                  />
                </div>

                <div class="flex items-center justify-between">
                  <label class="flex items-center text-sm text-gray-600 dark:text-gray-400">
                    <input type="checkbox" class="mr-2" />
                    Lembrar-me
                  </label>
                  <a href="#" class="text-sm text-indigo-600 dark:text-indigo-400 hover:underline">
                    Esqueci a senha?
                  </a>
                </div>

                <button
                  type="submit"
                  class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 shadow-lg"
                >
                  Entrar no Sistema
                </button>
              </form>

              <div class="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700 text-center">
                <p class="text-xs text-gray-500 dark:text-gray-400">
                  © 2026 FiberManager - Versão 1.0.0
                </p>
              </div>
            </div>
          </div>
        `
      }

                  <div class="flex-1 flex flex-col items-center">

                      <span class="text-xs text-gray-500 dark:text-gray-400">utilizados</span>
                    </div>
                  </div>
                  <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                    <div>
                      <p class="font-medium text-gray-800 dark:text-white text-sm">FIB-003</p>
                      <p class="text-xs text-gray-500 dark:text-gray-400">Cliente C • 08/07/2026 16:45</p>

                  <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                    <div>
                      <p class="font-medium text-gray-800 dark:text-white text-sm">FIB-008</p>

                    <div>
                      <p class="font-medium text-gray-800 dark:text-white text-sm">FIB-012</p>

      }

      // ========================================
      // FUNÇÕES GLOBAIS
      // ========================================
      
      // Alternar modo escuro
      function toggleDarkMode() {
        document.documentElement.classList.toggle('dark')
      }

      // Função de login
      function handleLogin(event) {
        event.preventDefault()
        
        const email = document.getElementById('email').value
        const senha = document.getElementById('senha').value
        
        if (email && senha) {
          showDashboard()
        } else {
          alert('Por favor, preencha todos os campos!')
        }
      }

      // ========================================
      // INICIAR O APP
      // ========================================
      showLogin()
    </script>
  </body>
</html>
