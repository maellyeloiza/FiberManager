<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FiberManager</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>
    
    <script>
      // ========================================
      // DADOS GLOBAIS
      // ========================================
      let bobinas = [
        { 
          id: 1, 
          localizacao: 'Depósito A - Prateleira 1',
          fabricante: 'Corning', 
          lote: 'LOT-2026-001',
          tipo: 'SMF-28', 
          capacidade: 24,
          metragemInicial: 2000, 
          metrosUsados: 150,
          status: 'Em uso'
        },
        { 
          id: 2, 
          localizacao: 'Depósito B - Prateleira 3',
          fabricante: 'Prysmian', 
          lote: 'LOT-2026-002',
          tipo: 'G.652.D', 
          capacidade: 48,
          metragemInicial: 3000, 
          metrosUsados: 0,
          status: 'Nova'
        },
        { 
          id: 3, 
          localizacao: 'Depósito A - Prateleira 2',
          fabricante: 'Furukawa', 
          lote: 'LOT-2026-003',
          tipo: 'G.655', 
          capacidade: 12,
          metragemInicial: 1500, 
          metrosUsados: 1500,
          status: 'Finalizada'
        }
      ]

      let movimentacoes = []
      let proximoId = 4
      let proximoMovId = 1
      let filtroBusca = ''

      // ========================================
      // FUNÇÕES DE NAVEGAÇÃO
      // ========================================
      function showLogin() {
        document.getElementById('root').innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-indigo-50 via-blue-50 to-cyan-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 flex items-center justify-center p-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md p-8">
              <div class="flex justify-end mb-4">
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                  <span class="text-xl">🌙</span>
                </button>
              </div>
              <div class="text-center mb-8">
                <div class="text-6xl mb-3">🔷</div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-600 to-blue-600 bg-clip-text text-transparent">
                  FiberManager
                </h1>
                <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">
                  Gerenciamento de Bobinas de Fibra Óptica
                </p>
              </div>
              <form onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                  <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">📧 E-mail</label>
                  <input type="email" id="email" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700 dark:text-white" placeholder="seu@email.com" required />
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">🔒 Senha</label>
                  <input type="password" id="senha" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700 dark:text-white" placeholder="••••••••" required />
                </div>
                <div class="flex items-center justify-between">
                  <label class="flex items-center text-sm text-gray-600 dark:text-gray-400">
                    <input type="checkbox" class="mr-2" /> Lembrar-me
                  </label>
                  <a href="#" class="text-sm text-indigo-600 dark:text-indigo-400 hover:underline">Esqueci a senha?</a>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 shadow-lg">
                  Entrar no Sistema
                </button>
              </form>
              <div class="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700 text-center">
                <p class="text-xs text-gray-500 dark:text-gray-400">© 2026 FiberManager - Versão 1.0.0</p>
              </div>
            </div>
          </div>
        `
      }

      function showDashboard() {
        const totalBobinas = bobinas.length
        const totalMetros = bobinas.reduce((total, b) => total + (b.metragemInicial - b.metrosUsados), 0)
        const estoqueBaixo = bobinas.filter(b => (b.metragemInicial - b.metrosUsados) < 500 && (b.metragemInicial - b.metrosUsados) > 0).length
        const consumoDia = movimentacoes
          .filter(m => m.data === new Date().toLocaleDateString('pt-BR'))
          .reduce((total, m) => total + m.metrosUtilizados, 0)

        document.getElementById('root').innerHTML = `
          <div class="min-h-screen bg-gray-50 dark:bg-gray-900 p-4 md:p-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6">
              <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 dark:text-white">📊 Dashboard</h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm">Bem-vindo(a) ao FiberManager!</p>
              </div>
              <div class="flex flex-wrap items-center gap-2 mt-3 md:mt-0">
                <button onclick="showBobinas()" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg text-sm transition">
                  📦 Bobinas
                </button>
                <button onclick="showSaida()" class="px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-lg text-sm transition">
                  📤 Registrar Saída
                </button>
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700">
                  <span class="text-xl">🌙</span>
                </button>
                <button onclick="showLogin()" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm">
                  Sair
                </button>
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-6">
                <p class="text-sm text-gray-500 dark:text-gray-400">📦 Bobinas em Estoque</p>
                <p class="text-3xl font-bold text-gray-800 dark:text-white">${totalBobinas}</p>
              </div>
              <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-6">
                <p class="text-sm text-gray-500 dark:text-gray-400">📏 Metros Disponíveis</p>
                <p class="text-3xl font-bold text-gray-800 dark:text-white">${totalMetros}m</p>
              </div>
              <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-6">
                <p class="text-sm text-gray-500 dark:text-gray-400">📉 Consumo do Dia</p>
                <p class="text-3xl font-bold text-gray-800 dark:text-white">${consumoDia}m</p>
              </div>
              <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-6">
                <p class="text-sm text-gray-500 dark:text-gray-400">⚠️ Estoque Baixo</p>
                <p class="text-3xl font-bold text-red-500">${estoqueBaixo}</p>
              </div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-6">
              <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">📋 Últimas Movimentações</h2>
              ${movimentacoes.length > 0 ? `
                <div class="space-y-3">
                  ${movimentacoes.slice(-5).reverse().map(m => `
                    <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                      <div>
                        <p class="font-medium text-gray-800 dark:text-white text-sm">Bobina #${m.bobinaId}</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400">${m.cliente} • ${m.data} ${m.hora}</p>
                      </div>
                      <div class="text-right">
                        <p class="font-bold text-orange-600 dark:text-orange-400 text-sm">-${m.metrosUtilizados}m</p>
                        <span class="text-xs text-gray-500 dark:text-gray-400">${m.funcionario}</span>
                      </div>
                    </div>
                  `).join('')}
                </div>
              ` : `
                <p class="text-center text-gray-500 dark:text-gray-400 py-8">Nenhuma movimentação registrada ainda.</p>
              `}
            </div>

            <div class="mt-8 text-center text-xs text-gray-500 dark:text-gray-400">
              © 2026 FiberManager - Todos os direitos reservados
            </div>
          </div>
        `
      }

      // ========================================
      // TELA DE CADASTRO DE BOBINAS
      // ========================================
      function showBobinas() {
        let bobinasFiltradas = bobinas
        if (filtroBusca.trim() !== '') {
          const termo = filtroBusca.toLowerCase().trim()
          bobinasFiltradas = bobinas.filter(b => 
            b.id.toString().includes(termo) ||
            b.localizacao.toLowerCase().includes(termo) ||
            b.fabricante.toLowerCase().includes(termo) ||
            b.lote.toLowerCase().includes(termo) ||
            b.tipo.toLowerCase().includes(termo) ||
            b.status.toLowerCase().includes(termo)
          )
        }

        const listaBobinas = bobinasFiltradas.map(b => {
          const metrosRestantes = b.metragemInicial - b.metrosUsados
          return `
            <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
              <td class="px-4 py-3 text-sm font-medium text-gray-800 dark:text-white">#${b.id}</td>
              <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-300">${b.localizacao}</td>
              <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-300">${b.fabricante}</td>
              <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-300">${b.lote}</td>
              <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-300">${b.tipo}</td>
              <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-300">${b.capacidade} FO</td>
              <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-300">${b.metragemInicial}m</td>
              <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-300">${b.metrosUsados}m</td>
              <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-300">${metrosRestantes}m</td>
              <td class="px-4 py-3 text-sm">
                <span class="px-2 py-1 rounded-full text-xs font-medium
                  ${b.status === 'Nova' ? 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300' : 
                    b.status === 'Em uso' ? 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300' : 
                    'bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-300'}">
                  ${b.status}
                </span>
              </td>
              <td class="px-4 py-3 text-sm">
                <button onclick="editarBobina(${b.id})" class="text-blue-600 hover:text-blue-800 dark:text-blue-400 mr-2">
                  ✏️
                </button>
                <button onclick="excluirBobina(${b.id})" class="text-red-600 hover:text-red-800 dark:text-red-400">
                  🗑️
                </button>
              </td>
            </tr>
          `
        }).join('')

        document.getElementById('root').innerHTML = `
          <div class="min-h-screen bg-gray-50 dark:bg-gray-900 p-4 md:p-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6">
              <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 dark:text-white">📦 Cadastro de Bobinas</h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm">Gerencie todas as bobinas do estoque</p>
              </div>
              <div class="flex flex-wrap items-center gap-2 mt-3 md:mt-0">
                <button onclick="showFormBobina()" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm transition">
                  ➕ Nova Bobina
                </button>
                <button onclick="showDashboard()" class="px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white rounded-lg text-sm transition">
                  ← Voltar
                </button>
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700">
                  <span class="text-xl">🌙</span>
                </button>
              </div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4 mb-6">
              <div class="flex flex-col sm:flex-row gap-3">
                <div class="flex-1">
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">🔍</span>
                    <input 
                      type="text" 
                      id="buscaBobina" 
                      value="${filtroBusca}"
                      oninput="filtrarBobinas(this.value)"
                      placeholder="Buscar por ID, localização, fabricante, lote, tipo ou status..." 
                      class="w-full pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white"
                    />
                  </div>
                </div>
                <button onclick="limparBusca()" class="px-4 py-2 bg-gray-300 hover:bg-gray-400 dark:bg-gray-600 dark:hover:bg-gray-700 text-gray-700 dark:text-white rounded-lg text-sm transition">
                  Limpar
                </button>
                <span class="text-sm text-gray-500 dark:text-gray-400 flex items-center">
                  ${bobinasFiltradas.length} bobina(s)
                </span>
              </div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm overflow-hidden">
              <div class="overflow-x-auto">
                <table class="w-full">
                  <thead class="bg-gray-50 dark:bg-gray-700">
                    <tr>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">ID</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Localização</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Fabricante</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Lote</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Tipo</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Capacidade</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Inicial</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Usados</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Restante</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Status</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Ações</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${bobinasFiltradas.length > 0 ? listaBobinas : `
                      <tr>
                        <td colspan="11" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">
                          ${filtroBusca ? 'Nenhuma bobina encontrada.' : 'Nenhuma bobina cadastrada.'}
                        </td>
                      </tr>
                    `}
                  </tbody>
                </table>
              </div>
            </div>

            <div class="mt-4 grid grid-cols-2 sm:grid-cols-5 gap-3">
              <div class="bg-white dark:bg-gray-800 rounded-lg p-3 text-center">
                <p class="text-xs text-gray-500 dark:text-gray-400">Total</p>
                <p class="text-xl font-bold text-gray-800 dark:text-white">${bobinas.length}</p>
              </div>
              <div class="bg-white dark:bg-gray-800 rounded-lg p-3 text-center">
                <p class="text-xs text-gray-500 dark:text-gray-400">Novas</p>
                <p class="text-xl font-bold text-green-600">${bobinas.filter(b => b.status === 'Nova').length}</p>
              </div>
              <div class="bg-white dark:bg-gray-800 rounded-lg p-3 text-center">
                <p class="text-xs text-gray-500 dark:text-gray-400">Em Uso</p>
                <p class="text-xl font-bold text-blue-600">${bobinas.filter(b => b.status === 'Em uso').length}</p>
              </div>
              <div class="bg-white dark:bg-gray-800 rounded-lg p-3 text-center">
                <p class="text-xs text-gray-500 dark:text-gray-400">Finalizadas</p>
                <p class="text-xl font-bold text-gray-600">${bobinas.filter(b => b.status === 'Finalizada').length}</p>
              </div>
              <div class="bg-white dark:bg-gray-800 rounded-lg p-3 text-center">
                <p class="text-xs text-gray-500 dark:text-gray-400">Filtradas</p>
                <p class="text-xl font-bold text-orange-600">${bobinasFiltradas.length}</p>
              </div>
            </div>

            <div class="mt-8 text-center text-xs text-gray-500 dark:text-gray-400">
              © 2026 FiberManager
            </div>
          </div>
        `
      }

      function filtrarBobinas(termo) {
        filtroBusca = termo
        showBobinas()
      }

      function limparBusca() {
        filtroBusca = ''
        document.getElementById('buscaBobina').value = ''
        showBobinas()
      }

      // ========================================
      // FORMULÁRIO DE BOBINA
      // ========================================
      function showFormBobina(id = null) {
        const editando = id !== null
        const bobina = editando ? bobinas.find(b => b.id === id) : null
        
        if (editando && !bobina) {
          alert('Bobina não encontrada!')
          showBobinas()
          return
        }

        const titulo = editando ? '✏️ Editar Bobina' : '➕ Nova Bobina'
        const botao = editando ? 'Atualizar' : 'Cadastrar'
        
        const localizacao = editando ? bobina.localizacao : ''
        const fabricante = editando ? bobina.fabricante : ''
        const lote = editando ? bobina.lote : ''
        const tipo = editando ? bobina.tipo : ''
        const capacidade = editando ? bobina.capacidade : ''
        const metragemInicial = editando ? bobina.metragemInicial : ''
        const metrosUsados = editando ? bobina.metrosUsados : ''
        const status = editando ? bobina.status : 'Nova'

        document.getElementById('root').innerHTML = `
          <div class="min-h-screen bg-gray-50 dark:bg-gray-900 p-4 md:p-6 flex items-center justify-center">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-2xl p-8">
              <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white">${titulo}</h2>
                <button onclick="showBobinas()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 text-2xl">✕</button>
              </div>

              <form onsubmit="salvarBobina(event)">
                <input type="hidden" id="editId" value="${editando ? id : ''}" />
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">📍 Localização *</label>
                    <input type="text" id="localizacao" value="${localizacao}" placeholder="Ex: Depósito A - Prateleira 1" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white" required />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">🏭 Fabricante *</label>
                    <input type="text" id="fabricante" value="${fabricante}" placeholder="Ex: Corning" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white" required />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">📦 Lote *</label>
                    <input type="text" id="lote" value="${lote}" placeholder="Ex: LOT-2026-001" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white" required />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">🔷 Tipo *</label>
                    <input type="text" id="tipo" value="${tipo}" placeholder="Ex: SMF-28" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white" required />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">📊 Capacidade (FO) *</label>
                    <input type="number" id="capacidade" value="${capacidade}" placeholder="Ex: 24" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white" required />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">📏 Metragem Inicial (m) *</label>
                    <input type="number" id="metragemInicial" value="${metragemInicial}" placeholder="0" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white" required />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">📉 Metros Usados (m) *</label>
                    <input type="number" id="metrosUsados" value="${metrosUsados}" placeholder="0" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white" required />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">📌 Status *</label>
                    <select id="status" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white">
                      <option value="Nova" ${status === 'Nova' ? 'selected' : ''}>🟢 Nova</option>
                      <option value="Em uso" ${status === 'Em uso' ? 'selected' : ''}>🔵 Em uso</option>
                      <option value="Finalizada" ${status === 'Finalizada' ? 'selected' : ''}>⚪ Finalizada</option>
                    </select>
                  </div>
                </div>

                <div class="mt-4 p-3 bg-gray-100 dark:bg-gray-700 rounded-lg">
                  <p class="text-sm text-gray-600 dark:text-gray-300">
                    📊 <strong>Metragem Restante:</strong> 
                    <span id="previewRestante" class="font-bold text-blue-600 dark:text-blue-400">
                      ${editando ? (bobina.metragemInicial - bobina.metrosUsados) : 0}m
                    </span>
                  </p>
                </div>

                <div class="flex gap-3 mt-6">
                  <button type="submit" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-lg transition">
                    ${botao}
                  </button>
                  <button type="button" onclick="showBobinas()" class="flex-1 bg-gray-300 hover:bg-gray-400 dark:bg-gray-600 dark:hover:bg-gray-700 text-gray-700 dark:text-white font-semibold py-3 rounded-lg transition">
                    Cancelar
                  </button>
                </div>
              </form>
            </div>
          </div>
        `
      }

      function salvarBobina(event) {
        event.preventDefault()
        
        const id = document.getElementById('editId').value
        const localizacao = document.getElementById('localizacao').value
        const fabricante = document.getElementById('fabricante').value
        const lote = document.getElementById('lote').value
        const tipo = document.getElementById('tipo').value
        const capacidade = parseFloat(document.getElementById('capacidade').value)
        const metragemInicial = parseFloat(document.getElementById('metragemInicial').value)
        const metrosUsados = parseFloat(document.getElementById('metrosUsados').value)
        const status = document.getElementById('status').value

        if (metrosUsados > metragemInicial) {
          alert('❌ Os metros usados não podem ser maiores que a metragem inicial!')
          return
        }

        if (id) {
          const index = bobinas.findIndex(b => b.id === parseInt(id))
          if (index !== -1) {
            bobinas[index] = { ...bobinas[index], localizacao, fabricante, lote, tipo, capacidade, metragemInicial, metrosUsados, status }
          }
          alert('✅ Bobina atualizada!')
        } else {
          bobinas.push({ id: proximoId++, localizacao, fabricante, lote, tipo, capacidade, metragemInicial, metrosUsados, status })
          alert('✅ Bobina cadastrada!')
        }
        showBobinas()
      }

      function editarBobina(id) { showFormBobina(id) }
      
      function excluirBobina(id) {
        if (confirm('⚠️ Tem certeza?')) {
          bobinas = bobinas.filter(b => b.id !== id)
          alert('🗑️ Bobina excluída!')
          showBobinas()
        }
      }
