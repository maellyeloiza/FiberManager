<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiberManager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script>
        // ============================================
        // CONFIGURAÇÃO DO SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://dibarwapqintkjvifkbm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Mm5CXywYX1pW7dbsqRyRFQ_gc-0jkcb';

        // ============================================
        // USUÁRIOS LIBERADOS
        // ============================================
        const USUARIOS = {
            'admin@fiber.com': { senha: 'admin123', nome: 'Administrador', tipo: 'admin' },
            'usuario@fiber.com': { senha: 'user123', nome: 'Usuário', tipo: 'usuario' },
            'visitante@fiber.com': { senha: 'visitante', nome: 'Visitante', tipo: 'visitante' }
        };

        // ============================================
        // DADOS GLOBAIS
        // ============================================
        let bobinas = [];
        let movimentacoes = [];
        let proximoId = 1;
        let filtroBusca = '';
        let usuarioAtual = null;

        // ============================================
        // FUNÇÕES DO SUPABASE
        // ============================================
        async function carregarDados() {
            try {
                const responseBobinas = await fetch(`${SUPABASE_URL}/rest/v1/bobinas?select=*&order=id.asc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                bobinas = await responseBobinas.json();
                
                const responseMov = await fetch(`${SUPABASE_URL}/rest/v1/movimentacoes?select=*&order=id.asc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                movimentacoes = await responseMov.json();
                
                if (bobinas.length > 0) {
                    proximoId = Math.max(...bobinas.map(b => b.id)) + 1;
                }
                
                console.log('✅ Dados carregados:', bobinas.length, 'bobinas,', movimentacoes.length, 'movimentações');
            } catch (error) {
                console.error('❌ Erro ao carregar dados:', error);
            }
        }

        async function salvarBobinaBD(bobina) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/bobinas`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(bobina)
                });
                const data = await response.json();
                return data[0];
            } catch (error) {
                console.error('❌ Erro ao salvar bobina:', error);
                return null;
            }
        }

        async function atualizarBobinaBD(id, dados) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/bobinas?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dados)
                });
                return response.ok;
            } catch (error) {
                console.error('❌ Erro ao atualizar bobina:', error);
                return false;
            }
        }

        async function excluirBobinaBD(id) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/bobinas?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                return response.ok;
            } catch (error) {
                console.error('❌ Erro ao excluir bobina:', error);
                return false;
            }
        }

        async function salvarMovimentacaoBD(mov) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/movimentacoes`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(mov)
                });
                const data = await response.json();
                return data[0];
            } catch (error) {
                console.error('❌ Erro ao salvar movimentação:', error);
                return null;
            }
        }

        // ============================================
        // FUNÇÕES DE AUTENTICAÇÃO
        // ============================================
        function fazerLogin(email, senha) {
            const usuario = USUARIOS[email];
            if (usuario && usuario.senha === senha) {
                usuarioAtual = { email, ...usuario };
                localStorage.setItem('@FiberManager:usuario', JSON.stringify(usuarioAtual));
                return true;
            }
            return false;
        }

        function getUsuarioLogado() {
            if (usuarioAtual) return usuarioAtual;
            const saved = localStorage.getItem('@FiberManager:usuario');
            if (saved) {
                usuarioAtual = JSON.parse(saved);
                return usuarioAtual;
            }
            return null;
        }

        function logout() {
            if (confirm('Deseja realmente sair?')) {
                localStorage.removeItem('@FiberManager:usuario');
                usuarioAtual = null;
                showLogin();
            }
        }

        function isAdmin() {
            const user = getUsuarioLogado();
            return user && user.tipo === 'admin';
        }

        function isUsuario() {
            const user = getUsuarioLogado();
            return user && (user.tipo === 'admin' || user.tipo === 'usuario');
        }

        function isVisitante() {
            const user = getUsuarioLogado();
            return user && user.tipo === 'visitante';
        }

        function podeAlterar() {
            return isUsuario() || isAdmin();
        }

        // ============================================
        // TELA DE LOGIN
        // ============================================
        function showLogin() {
            const user = getUsuarioLogado();
            if (user) {
                showDashboard();
                return;
            }

            document.getElementById('root').innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-50 dark:from-gray-900 dark:to-gray-800 flex items-center justify-center p-4">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md p-8">
                        <div class="flex justify-end">
                            <button onclick="toggleDarkMode()" class="text-2xl">🌙</button>
                        </div>
                        <div class="text-center mb-8">
                            <div class="text-6xl mb-3">🔷</div>
                            <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-600 to-blue-600 bg-clip-text text-transparent">
                                FiberManager
                            </h1>
                            <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">
                                Gerenciamento de Bobinas de Fibra Óptica
                            </p>
                        </div>
                        <form onsubmit="handleLogin(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">📧 E-mail</label>
                                <input type="email" id="email" placeholder="seu@email.com" class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:text-white" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">🔒 Senha</label>
                                <input type="password" id="senha" placeholder="••••••••" class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:text-white" required>
                            </div>
                            <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white font-bold py-3 rounded-lg transition shadow-lg">
                                Entrar
                            </button>
                        </form>
                        <div class="mt-6 text-center">
                            <p class="text-sm text-gray-500 dark:text-gray-400">👀 <strong>Visitante:</strong> visitante@fiber.com / visitante</p>
                            <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">👑 <strong>Admin:</strong> admin@fiber.com / admin123</p>
                            <p class="text-xs text-gray-400 dark:text-gray-500">👤 <strong>Usuário:</strong> usuario@fiber.com / user123</p>
                        </div>
                        <div class="mt-8 text-center text-xs text-gray-500">© 2026 FiberManager</div>
                    </div>
                </div>
            `;
        }

        // ============================================
        // FUNÇÃO DE LOGIN
        // ============================================
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            if (fazerLogin(email, senha)) {
                showDashboard();
            } else {
                alert('❌ E-mail ou senha inválidos!\n\n📌 Use:\n- visitante@fiber.com / visitante\n- admin@fiber.com / admin123\n- usuario@fiber.com / user123');
            }
        }

        // ============================================
        // TELA DE DASHBOARD (ATUALIZADA COM GRÁFICOS)
        // ============================================
        function showDashboard() {
            const user = getUsuarioLogado();
            if (!user) { showLogin(); return; }

            // Calcular totais
            const totalBobinas = bobinas.length;
            const totalMetros = bobinas.reduce((t, b) => t + (b.metragem_inicial - b.metros_usados), 0);
            const totalConsumido = bobinas.reduce((t, b) => t + b.metros_usados, 0);
            const alerta = bobinas.filter(b => (b.metragem_inicial - b.metros_usados) < 1500 && (b.metragem_inicial - b.metros_usados) > 0).length;
            const consumoDia = movimentacoes.filter(m => m.data === new Date().toLocaleDateString('pt-BR')).reduce((t, m) => t + m.metros_utilizados, 0);

            // Gráfico de cada bobina
            const graficoBobinas = bobinas.map(b => {
                const restante = b.metragem_inicial - b.metros_usados;
                const percentual = b.metragem_inicial > 0 ? (restante / b.metragem_inicial * 100) : 0;
                const cor = percentual > 50 ? 'bg-green-500' : percentual > 25 ? 'bg-yellow-500' : 'bg-red-500';
                return `
                    <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow hover:shadow-lg transition-shadow">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="font-semibold text-gray-800 dark:text-white text-sm">${b.fabricante}</p>
                                <p class="text-xs text-gray-500 dark:text-gray-400">${b.lote} - ${b.tipo}</p>
                            </div>
                            <span class="text-xs px-2 py-1 rounded-full ${b.status === 'Nova' ? 'bg-green-100 text-green-700' : b.status === 'Em uso' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-700'}">${b.status}</span>
                        </div>
                        <div class="mt-2">
                            <div class="flex justify-between text-xs text-gray-600 dark:text-gray-400 mb-1">
                                <span>${restante}m disponíveis</span>
                                <span>${b.metros_usados}m usados</span>
                            </div>
                            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 overflow-hidden">
                                <div class="${cor} h-3 rounded-full transition-all duration-500" style="width: ${percentual}%"></div>
                            </div>
                            <div class="flex justify-between text-xs text-gray-500 dark:text-gray-400 mt-1">
                                <span>${b.metragem_inicial}m total</span>
                                <span>${percentual.toFixed(0)}% disponível</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            const podeAlterar = !isVisitante();

            document.getElementById('root').innerHTML = `
                <div class="min-h-screen bg-gray-50 dark:bg-gray-900 p-4 md:p-6">
                    <!-- Cabeçalho -->
                    <div class="flex flex-wrap justify-between items-center mb-6">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">📊 Dashboard</h1>
                            <p class="text-gray-500 dark:text-gray-400">Bem-vindo, <strong>${user.nome}</strong>! ${isVisitante() ? '👀 (Modo Visualização)' : ''}</p>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-3 md:mt-0">
                            <button onclick="showBobinas()" class="px-4 py-2 bg-green-500 text-white rounded-lg text-sm hover:bg-green-600">📦 Bobinas</button>
                            ${podeAlterar ? `<button onclick="showSaida()" class="px-4 py-2 bg-orange-500 text-white rounded-lg text-sm hover:bg-orange-600">📤 Registrar Saída</button>` : ''}
                            <button onclick="showRelatorios()" class="px-4 py-2 bg-purple-500 text-white rounded-lg text-sm hover:bg-purple-600">📊 Relatórios</button>
                            <button onclick="toggleDarkMode()" class="px-4 py-2 bg-gray-300 dark:bg-gray-700 rounded-lg text-sm">🌙</button>
                            <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg text-sm hover:bg-red-600">Sair</button>
                        </div>
                    </div>

                    <!-- Cards Resumo -->
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                        <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow border-l-4 border-blue-500">
                            <p class="text-sm text-gray-500 dark:text-gray-400">📦 Total Bobinas</p>
                            <p class="text-2xl font-bold text-gray-800 dark:text-white">${totalBobinas}</p>
                        </div>
                        <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow border-l-4 border-green-500">
                            <p class="text-sm text-gray-500 dark:text-gray-400">📏 Metragem Total</p>
                            <p class="text-2xl font-bold text-gray-800 dark:text-white">${totalMetros}m</p>
                        </div>
                        <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow border-l-4 border-orange-500">
                            <p class="text-sm text-gray-500 dark:text-gray-400">📉 Total Consumido</p>
                            <p class="text-2xl font-bold text-orange-600">${totalConsumido}m</p>
                        </div>
                        <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow border-l-4 border-purple-500">
                            <p class="text-sm text-gray-500 dark:text-gray-400">📋 Movimentações</p>
                            <p class="text-2xl font-bold text-gray-800 dark:text-white">${movimentacoes.length}</p>
                        </div>
                        <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow border-l-4 border-red-500">
                            <p class="text-sm text-gray-500 dark:text-gray-400">⚠️ Estoque Baixo</p>
                            <p class="text-2xl font-bold text-red-500">${alerta}</p>
                        </div>
                    </div>

                    <!-- Gráfico de cada bobina -->
                    <div class="mb-6">
                        <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">📊 Status de Cada Bobina</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            ${bobinas.length > 0 ? graficoBobinas : '<p class="text-center text-gray-500 dark:text-gray-400 py-8 col-span-full">Nenhuma bobina cadastrada.</p>'}
                        </div>
                    </div>

                    <!-- Últimas Movimentações -->
                    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow">
                        <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">📋 Últimas Movimentações</h2>
                        ${movimentacoes.length === 0 ? '<p class="text-center text-gray-500 dark:text-gray-400 py-4">Nenhuma movimentação registrada.</p>' : 
                            movimentacoes.slice(-5).reverse().map(m => {
                                const bobina = bobinas.find(b => b.id === m.bobina_id);
                                const nomeBobina = bobina ? `${bobina.fabricante} - ${bobina.lote} - ${bobina.tipo}` : '#' + m.bobina_id;
                                return `
                                    <div class="flex justify-between items-center p-3 bg-gray-50 dark:bg-gray-700 rounded-lg mb-2 hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">
                                        <div>
                                            <span class="font-medium text-gray-800 dark:text-white">${nomeBobina}</span>
                                            <span class="text-sm text-gray-500 dark:text-gray-400 ml-2">${m.equipe}</span>
                                        </div>
                                        <div class="text-right">
                                            <span class="font-bold text-orange-600">-${m.metros_utilizados}m</span>
                                            <span class="text-xs text-gray-500 dark:text-gray-400 block">${m.data}</span>
                                        </div>
                                    </div>
                                `;
                            }).join('')
                        }
                    </div>
                    <div class="mt-4 text-center text-xs text-gray-500">© 2026 FiberManager</div>
                </div>
            `;
        }

        // ============================================
        // TELA DE BOBINAS
        // ============================================
        function showBobinas() {
            const user = getUsuarioLogado();
            if (!user) { showLogin(); return; }

            const podeAlterar = !isVisitante();

            let lista = bobinas;
            if (filtroBusca.trim()) {
                const termo = filtroBusca.toLowerCase();
                lista = bobinas.filter(b => 
                    b.id.toString().includes(termo) ||
                    b.localizacao.toLowerCase().includes(termo) ||
                    b.fabricante.toLowerCase().includes(termo) ||
                    b.lote.toLowerCase().includes(termo) ||
                    b.tipo.toLowerCase().includes(termo) ||
                    b.status.toLowerCase().includes(termo)
                );
            }

            document.getElementById('root').innerHTML = `
                <div class="min-h-screen bg-gray-50 dark:bg-gray-900 p-4 md:p-6">
                    <div class="flex flex-wrap justify-between items-center mb-6">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">📦 Bobinas</h1>
                            <p class="text-gray-500 dark:text-gray-400">${lista.length} bobina(s) encontrada(s)</p>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-3 md:mt-0">
                            ${podeAlterar ? `<button onclick="showFormBobina()" class="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600">➕ Nova</button>` : ''}
                            <button onclick="showDashboard()" class="px-4 py-2 bg-gray-500 text-white rounded-lg text-sm hover:bg-gray-600">← Voltar</button>
                            <button onclick="toggleDarkMode()" class="px-4 py-2 bg-gray-300 dark:bg-gray-700 rounded-lg text-sm">🌙</button>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow mb-6">
                        <div class="flex gap-3">
                            <div class="flex-1 relative">
                                <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">🔍</span>
                                <input type="text" id="buscaInput" value="${filtroBusca}" oninput="filtrarBobinas(this.value)" placeholder="Buscar..." class="w-full pl-10 pr-4 py-2 border rounded-lg dark:bg-gray-700 dark:text-white">
                            </div>
                            <button onclick="limparBusca()" class="px-4 py-2 bg-gray-300 dark:bg-gray-600 rounded-lg">Limpar</button>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-gray-800 rounded-xl shadow overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50 dark:bg-gray-700">
                                <tr>
                                    <th class="px-4 py-2 text-left">ID</th>
                                    <th class="px-4 py-2 text-left">Localização</th>
                                    <th class="px-4 py-2 text-left">Fabricante</th>
                                    <th class="px-4 py-2 text-left">Lote</th>
                                    <th class="px-4 py-2 text-left">Tipo</th>
                                    <th class="px-4 py-2 text-left">Capacidade</th>
                                    <th class="px-4 py-2 text-left">Inicial</th>
                                    <th class="px-4 py-2 text-left">Usados</th>
                                    <th class="px-4 py-2 text-left">Restante</th>
                                    <th class="px-4 py-2 text-left">Status</th>
                                    ${podeAlterar ? '<th class="px-4 py-2 text-left">Ações</th>' : ''}
                                </tr>
                            </thead>
                            <tbody>
                                ${lista.length === 0 ? `
                                    <tr><td colspan="${podeAlterar ? 11 : 10}" class="text-center py-8 text-gray-500">Nenhuma bobina encontrada</td></tr>
                                ` : lista.map(b => `
                                    <tr class="border-b dark:border-gray-700">
                                        <td class="px-4 py-2 font-medium">#${b.id}</td>
                                        <td class="px-4 py-2">${b.localizacao}</td>
                                        <td class="px-4 py-2">${b.fabricante}</td>
                                        <td class="px-4 py-2">${b.lote}</td>
                                        <td class="px-4 py-2">${b.tipo}</td>
                                        <td class="px-4 py-2">${b.capacidade} FO</td>
                                        <td class="px-4 py-2">${b.metragem_inicial}m</td>
                                        <td class="px-4 py-2">${b.metros_usados}m</td>
                                        <td class="px-4 py-2">${b.metragem_inicial - b.metros_usados}m</td>
                                        <td class="px-4 py-2">
                                            <span class="px-2 py-1 rounded-full text-xs ${b.status === 'Nova' ? 'bg-green-100 text-green-700' : b.status === 'Em uso' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-700'}">${b.status}</span>
                                        </td>
                                        ${podeAlterar ? `
                                        <td class="px-4 py-2">
                                            <button onclick="editarBobina(${b.id})" class="text-blue-600 mr-2">✏️</button>
                                            <button onclick="excluirBobina(${b.id})" class="text-red-600">🗑️</button>
                                        </td>` : ''}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-4 grid grid-cols-5 gap-2 text-center">
                        <div class="bg-white dark:bg-gray-800 rounded-lg p-2"><p class="text-xs text-gray-500">Total</p><p class="font-bold">${bobinas.length}</p></div>
                        <div class="bg-white dark:bg-gray-800 rounded-lg p-2"><p class="text-xs text-gray-500">Novas</p><p class="font-bold text-green-600">${bobinas.filter(b => b.status === 'Nova').length}</p></div>
                        <div class="bg-white dark:bg-gray-800 rounded-lg p-2"><p class="text-xs text-gray-500">Em Uso</p><p class="font-bold text-blue-600">${bobinas.filter(b => b.status === 'Em uso').length}</p></div>
                        <div class="bg-white dark:bg-gray-800 rounded-lg p-2"><p class="text-xs text-gray-500">Finalizadas</p><p class="font-bold text-gray-600">${bobinas.filter(b => b.status === 'Finalizada').length}</p></div>
                        <div class="bg-white dark:bg-gray-800 rounded-lg p-2"><p class="text-xs text-gray-500">Filtradas</p><p class="font-bold text-orange-600">${lista.length}</p></div>
                    </div>
                </div>
            `;
        }

        // ============================================
        // FORMULÁRIO DE BOBINA
        // ============================================
        function showFormBobina(id = null) {
            if (!podeAlterar()) {
                alert('❌ Visitante não pode cadastrar bobinas!');
                showBobinas();
                return;
            }

            const editando = id !== null;
            const b = editando ? bobinas.find(x => x.id === id) : null;
            if (editando && !b) { alert('Bobina não encontrada!'); showBobinas(); return; }

            const titulo = editando ? '✏️ Editar' : '➕ Nova Bobina';
            const botao = editando ? 'Atualizar' : 'Cadastrar';

        // ============================================

        async function salvarBobina(event) {
            event.preventDefault();
            
            if (!podeAlterar()) {
                alert('❌ Visitante não pode cadastrar bobinas!');
                showBobinas();
                return;
            }

            const id = document.getElementById('editId').value;
            const localizacao = document.getElementById('fLocalizacao').value;
            const fabricante = document.getElementById('fFabricante').value;
            const lote = document.getElementById('fLote').value;
            const tipo = document.getElementById('fTipo').value;
            const capacidade = parseFloat(document.getElementById('fCapacidade').value);
            const metragemInicial = parseFloat(document.getElementById('fMetragemInicial').value);
            const metrosUsados = parseFloat(document.getElementById('fMetrosUsados').value);
            const status = document.getElementById('fStatus').value;

            if (metrosUsados > metragemInicial) {
                alert('❌ Metros usados não podem ser maiores que a metragem inicial!');
                return;
            }

            const dados = {
                localizacao,
                fabricante,
                lote,
                tipo,
                capacidade,
                metragem_inicial: metragemInicial,
                metros_usados: metrosUsados,
                status
            };

            if (id) {
                const sucesso = await atualizarBobinaBD(parseInt(id), dados);
                if (sucesso) {
                    const index = bobinas.findIndex(b => b.id === parseInt(id));
                    if (index !== -1) {
                        bobinas[index] = { ...bobinas[index], ...dados };
                    }
                    alert('✅ Bobina atualizada!');
                } else {
                    alert('❌ Erro ao atualizar bobina!');
                }
            } else {
                const nova = await salvarBobinaBD(dados);
                if (nova) {
                    bobinas.push(nova);
                    proximoId = Math.max(...bobinas.map(b => b.id)) + 1;
                    alert('✅ Bobina cadastrada!');
                } else {
                    alert('❌ Erro ao cadastrar bobina!');
                }
            }
            showBobinas();
        }

        // ============================================
        // FUNÇÃO PARA REGISTRAR SAÍDA (CORRIGIDA)
        // ============================================
        async function registrarSaida(event) {
            event.preventDefault();
            
            if (!podeAlterar()) {
                alert('❌ Visitante não pode registrar saídas!');
                showDashboard();
                return;
            }

            const bobinaId = parseInt(document.getElementById('sBobinaId').value);
            const equipe = document.getElementById('sEquipe').value;
            const funcionario = document.getElementById('sFuncionario').value;
            const ordem = document.getElementById('sOrdem').value;
            const metros = parseFloat(document.getElementById('sMetros').value) || 0;
            const obs = document.getElementById('sObservacao').value;

            if (!bobinaId) { 
                alert('❌ Selecione uma bobina!'); 
                return; 
            }
            
            if (!equipe.trim()) { 
                alert('❌ Digite o nome da empresa!'); 
                return; 
            }
            
            if (!funcionario.trim()) { 
                alert('❌ Digite o nome do técnico!'); 
                return; 
            }
            
            const bobina = bobinas.find(b => b.id === bobinaId);
            if (!bobina) { 
                alert('❌ Bobina não encontrada!'); 
                return; 
            }

            const disponivel = bobina.metragem_inicial - bobina.metros_usados;
            
            if (metros === 0) {
                if (!confirm(`⚠️ Você está registrando 0 metros para a bobina ${bobina.fabricante} - ${bobina.lote} - ${bobina.tipo}.\n\nDeseja continuar?`)) {
                    return;
                }
            }
            
            if (metros < 0) { 
                alert('❌ Os metros não podem ser negativos!'); 
                return; 
            }

            if (metros > disponivel) { 
                alert(`❌ Disponível: ${disponivel}m`); 
                return; 
            }

            // Calcular novos valores
            const novosMetrosUsados = bobina.metros_usados + metros;
            let novoStatus = bobina.status;
            const restante = bobina.metragem_inicial - novosMetrosUsados;
            
            if (restante === 0) {
                novoStatus = 'Finalizada';
            } else if (novosMetrosUsados > 0) {
                novoStatus = 'Em uso';
            }

            // Atualizar no banco de dados
            const sucesso = await atualizarBobinaBD(bobinaId, {
                metros_usados: novosMetrosUsados,
                status: novoStatus
            });

            if (!sucesso) {
                alert('❌ Erro ao atualizar bobina!');
                return;
            }

            // Atualizar localmente
            bobina.metros_usados = novosMetrosUsados;
            bobina.status = novoStatus;

            // Registrar movimentação no banco
            const now = new Date();
            const mov = {
                bobina_id: bobinaId,
                equipe: equipe,
                funcionario: funcionario,
                ordem_servico: ordem || null,
                metros_utilizados: metros,
                observacao: obs || null,
                data: now.toLocaleDateString('pt-BR'),
                hora: now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
            };

            const novaMov = await salvarMovimentacaoBD(mov);
            if (novaMov) {
                movimentacoes.push(novaMov);
            }

            alert(`✅ Saída registrada!\n📏 ${metros}m utilizados\n📦 Restante: ${restante}m`);
            
            // Limpar formulário
            document.getElementById('sBobinaId').value = '';
            document.getElementById('sEquipe').value = '';
            document.getElementById('sFuncionario').value = '';
            document.getElementById('sOrdem').value = '';
            document.getElementById('sMetros').value = '';
            document.getElementById('sObservacao').value = '';
            
            // Recarregar dados e mostrar dashboard atualizado
            await carregarDados();
            showDashboard();
        }

                                    </div>
                                </div>
                                <div>
                                    <div class="flex justify-between text-sm">
                                        <span class="text-gray-600 dark:text-gray-400">⚪ Finalizada</span>

                                </div>

                        <div class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow">

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

                        </div>
                        <div class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow">
                            <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">👤 Consumo por Técnico</h2>

                    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow">

                        ${movimentacoes.length === 0 ? '<p class="text-center text-gray-500 dark:text-gray-400 py-4">Nenhuma movimentação registrada.</p>' : `
                            <div class="overflow-x-auto max-h-64 overflow-y-auto">

                                                    <td class="px-4 py-2">${m.funcionario}</td>

                                </table>

        }

        // ============================================
        // EXPORTAÇÃO EXCEL
        // ============================================
        function exportarExcel() {
            if (movimentacoes.length === 0) {
                alert('❌ Não há dados para exportar!');
                return;
            }

            let html = `
            <html xmlns:o="urn:schemas-microsoft-com:office:office" 
                  xmlns:x="urn:schemas-microsoft-com:office:excel" 
                  xmlns="http://www.w3.org/TR/REC-html40">
            <head>
                <meta charset="UTF-8">
                <!--[if gte mso 9]>
                <xml>
                    <x:ExcelWorkbook>
                        <x:ExcelWorksheets>
                            <x:ExcelWorksheet>
                                <x:Name>Relatório</x:Name>
                                <x:WorksheetOptions>
                                    <x:DisplayGridlines/>
                                </x:WorksheetOptions>
                            </x:ExcelWorksheet>
                        </x:ExcelWorksheets>
                    </x:ExcelWorkbook>
                </xml>
                <![endif]-->
                <style>
                    table { border-collapse: collapse; width: 100%; }
                    th { background-color: #4F46E5; color: white; padding: 8px; border: 1px solid #000; }
                    td { padding: 8px; border: 1px solid #ccc; }
                </style>
            </head>
            <body>
                <h2>🔷 FiberManager - Relatório de Movimentações</h2>
                <p>Gerado em: ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}</p>
                <br>
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Bobina</th>
                            <th>Metros</th>
                            <th>Empresa</th>
                            <th>Técnico</th>
                            <th>OS</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            movimentacoes.forEach(m => {
                const bobina = bobinas.find(b => b.id === m.bobina_id);
                const nomeBobina = bobina ? `${bobina.fabricante} - ${bobina.lote} - ${bobina.tipo}` : '#' + m.bobina_id;
                html += `
                        <tr>
                            <td>${m.data}</td>
                            <td>${nomeBobina}</td>
                            <td>${m.metros_utilizados}</td>
                            <td>${m.equipe}</td>
                            <td>${m.funcionario}</td>
                            <td>${m.ordem_servico || '-'}</td>
                        </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
                <br>
                <p><strong>Resumo:</strong></p>
                <ul>
                    <li>Total de Movimentações: ${movimentacoes.length}</li>
                    <li>Total de Metros Consumidos: ${movimentacoes.reduce((t, m) => t + m.metros_utilizados, 0)}m</li>
                </ul>
            </body>
            </html>
            `;

            const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `relatorio_fibermanager_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.xls`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            alert('✅ Relatório exportado com sucesso!');
        }

        // ============================================
        // EXPORTAÇÃO PDF
        // ============================================
        function exportarPDF() {
            if (movimentacoes.length === 0) {
                alert('❌ Não há dados para exportar!');
                return;
            }

            let html = `
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <title>Relatório FiberManager</title>
                <style>
                    body { font-family: Arial, sans-serif; margin: 40px; color: #333; }
                    .header { text-align: center; border-bottom: 3px solid #4F46E5; padding-bottom: 20px; margin-bottom: 30px; }
                    .header h1 { color: #4F46E5; font-size: 28px; margin: 0; }
                    .header p { color: #666; font-size: 14px; margin: 5px 0 0 0; }
                    .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
                    .info-card { background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #e9ecef; }
                    .info-card .label { font-size: 12px; color: #666; margin-bottom: 5px; }
                    .info-card .value { font-size: 20px; font-weight: bold; color: #1a1a2e; }
                    .info-card .value.orange { color: #f97316; }
                    .info-card .value.green { color: #22c55e; }
                    .info-card .value.red { color: #ef4444; }
                    .section-title { font-size: 18px; font-weight: bold; color: #1a1a2e; border-bottom: 2px solid #e9ecef; padding-bottom: 10px; margin-top: 30px; margin-bottom: 15px; }
                    table { width: 100%; border-collapse: collapse; font-size: 13px; }
                    th { background: #4F46E5; color: white; padding: 10px 12px; text-align: left; }
                    td { padding: 8px 12px; border-bottom: 1px solid #e9ecef; }
                    tr:nth-child(even) { background: #f8f9fa; }
                    .footer { text-align: center; color: #999; font-size: 12px; margin-top: 40px; padding-top: 20px; border-top: 1px solid #e9ecef; }
                    .alert-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 15px; margin-top: 15px; }
                    .alert-box .alert-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #fecaca; }
                    .alert-box .alert-item:last-child { border-bottom: none; }
                    .alert-box .alert-item .metros { font-weight: bold; color: #dc2626; }
                    @media print { body { margin: 20px; } .no-print { display: none; } }
                </style>
            </head>
            <body>
                <div class="header">
                    <h1>🔷 FiberManager</h1>
                    <p>Relatório de Movimentações</p>
                    <p style="font-size: 12px; color: #999;">Gerado em: ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}</p>
                </div>
            `;

            const totalBobinas = bobinas.length;
            const totalMetros = bobinas.reduce((t, b) => t + (b.metragem_inicial - b.metros_usados), 0);
            const totalConsumido = bobinas.reduce((t, b) => t + b.metros_usados, 0);
            
            html += `
                <div class="info-grid">
                    <div class="info-card"><div class="label">📦 Total Bobinas</div><div class="value">${totalBobinas}</div></div>
                    <div class="info-card"><div class="label">📏 Metros Disponíveis</div><div class="value green">${totalMetros}m</div></div>
                    <div class="info-card"><div class="label">📉 Total Consumido</div><div class="value orange">${totalConsumido}m</div></div>
                    <div class="info-card"><div class="label">📋 Movimentações</div><div class="value">${movimentacoes.length}</div></div>
                </div>
            `;

            const estoqueBaixo = bobinas.filter(b => (b.metragem_inicial - b.metros_usados) < 1500 && (b.metragem_inicial - b.metros_usados) > 0);
            if (estoqueBaixo.length > 0) {
                html += `
                    <div class="section-title">⚠️ Estoque Baixo (&lt; 1500m)</div>
                    <div class="alert-box">
                        ${estoqueBaixo.map(b => `
                            <div class="alert-item">
                                <span>${b.fabricante} - ${b.lote} - ${b.tipo}</span>
                                <span class="metros">${b.metragem_inicial - b.metros_usados}m</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            html += `
                <div class="section-title">📋 Movimentações</div>
                <table>
                    <thead><tr><th>Data</th><th>Bobina</th><th>Metros</th><th>Empresa</th><th>Técnico</th><th>OS</th></tr></thead>
                    <tbody>
            `;

            movimentacoes.slice().reverse().forEach(m => {
                const bobina = bobinas.find(b => b.id === m.bobina_id);
                const nomeBobina = bobina ? `${bobina.fabricante} - ${bobina.lote} - ${bobina.tipo}` : '#' + m.bobina_id;
                html += `
                    <tr>
                        <td>${m.data}</td>
                        <td>${nomeBobina}</td>
                        <td><strong>${m.metros_utilizados}m</strong></td>
                        <td>${m.equipe}</td>
                        <td>${m.funcionario}</td>
                        <td>${m.ordem_servico || '-'}</td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
                <div class="footer">
                    <p>© 2026 FiberManager - Todos os direitos reservados</p>
                    <p>Este relatório foi gerado automaticamente pelo sistema FiberManager.</p>
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    <button onclick="window.print()" style="padding: 10px 30px; background: #4F46E5; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;">🖨️ Imprimir / Salvar como PDF</button>
                    <button onclick="window.close()" style="padding: 10px 30px; background: #6b7280; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-left: 10px;">✕ Fechar</button>
                </div>
            </body>
            </html>
            `;

            const win = window.open('', '_blank', 'width=1000,height=800');
            win.document.write(html);
            win.document.close();
            win.focus();
            
            setTimeout(() => {
                alert('✅ Relatório PDF aberto!\n\n📌 Clique em "Imprimir" para salvar como PDF.');
            }, 500);
        }

        // ============================================
        // FUNÇÕES GLOBAIS
        // ============================================
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        // ============================================
        // INICIAR (CARREGAR DADOS DO BANCO)
        // ============================================
        async function iniciarApp() {
            await carregarDados();
            showLogin();
        }
        
        iniciarApp();
    </script>
</body>
